services:
  coffee-tracker:
    image: docker.io/library/node:20-bookworm-slim
    privileged: true
    working_dir: /app
    env_file:
      - .env
    environment:
      # Store the SQLite DB on the host under ./data (mounted to /data)
      - DATABASE_URL=file:/data/coffee.db
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - ./data:/data
      - ./logs:/logs
    command: >-
      sh -lc "npm ci --include=dev --no-audit --no-fund
      && npm run build
      && (npm run migrate:deploy || (./node_modules/.bin/prisma migrate resolve --applied 20260503214403_init && npm run migrate:deploy))
      && node dist/index.js"
    restart: unless-stopped

volumes:
  node_modules: {}
