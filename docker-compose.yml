services:
  coffee-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/data/coffee.db
    ports:
      - "8001:8000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    restart: unless-stopped
